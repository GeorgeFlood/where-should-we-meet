[phases.setup]
nixPkgs = ["nodejs_20", "npm", "php84", "php84Extensions.pdo", "php84Extensions.pdo_sqlite", "php84Extensions.sqlite3", "php84Extensions.mbstring", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.ctype", "php84Extensions.curl", "php84Extensions.dom", "php84Extensions.fileinfo", "php84Extensions.filter", "php84Extensions.openssl", "php84Extensions.session"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm ci",
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache",
    "mkdir -p /app/storage/database",
    "touch /app/storage/database/database.sqlite",
]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
